# Ouroboros CI — Four-tier cross-platform testing and release pipeline
#
# Tier 1: Every push to ouroboros (code paths) → Ubuntu-only tests (~1 min)
# Tier 2: Push to ouroboros-stable / manual / tag → Full 3-OS matrix (~5 min)
# Tier 2.5: Push to ouroboros-stable / manual / tag → Provider integration tests (~1 min)
# Tier 3: Tag v* → Full matrix + integration + build artifacts + GitHub Release (~15 min)
#         macOS build is signed + notarized when Apple secrets are present; unsigned otherwise.

name: CI

# Two separate push triggers: branches have path filters, tags do not.
# This ensures tag pushes always fire (even if only VERSION/README changed).
on:
  push:
    branches: [ouroboros, ouroboros-stable]
    paths:
      - 'ouroboros/**'
      - 'supervisor/**'
      - 'server.py'
      - 'tests/**'
      - 'web/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/**'
      - 'build.sh'
      - 'build_linux.sh'
      - 'build_windows.ps1'
      - 'Dockerfile'
      - 'scripts/**'
      - 'VERSION'
      - 'README.md'
      - 'launcher.py'
    tags:
      - 'v*'
  workflow_dispatch:

# Note: GitHub Actions evaluates `branches` + `paths` together but `tags`
# separately — a tag push matching `v*` will trigger regardless of paths.

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Tier 1: Quick tests on Ubuntu (every push to ouroboros)
  # ──────────────────────────────────────────────────────────────────
  quick-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/ouroboros'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen --extra browser
      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

  # ──────────────────────────────────────────────────────────────────
  # Tier 2: Full matrix (stable branch, manual, or tag push)
  # ──────────────────────────────────────────────────────────────────
  full-test:
    if: |
      github.ref == 'refs/heads/ouroboros-stable'
      || github.event_name == 'workflow_dispatch'
      || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen --extra browser
      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

  # ──────────────────────────────────────────────────────────────────
  # Tier 2.5: Provider integration tests (stable + manual + tag)
  # Real API calls — ~$0.006 per run, skipped when secrets are absent.
  # ──────────────────────────────────────────────────────────────────
  integration-test:
    if: |
      github.ref == 'refs/heads/ouroboros-stable'
      || github.event_name == 'workflow_dispatch'
      || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen --extra browser
      - name: Run integration tests
        run: uv run pytest tests/test_provider_integration.py -m integration -o "addopts=" -q --tb=short

  # ──────────────────────────────────────────────────────────────────
  # Tier 3: Build & Release (tag push only)
  # ──────────────────────────────────────────────────────────────────
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [full-test, integration-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: dmg
          - os: ubuntu-latest
            artifact: tar.gz
          - os: windows-latest
            artifact: zip
    runs-on: ${{ matrix.os }}
    env:
      # Signing secrets at job level so step-level if: conditions can read env.*
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
      - name: Install build dependencies
        run: uv pip install --system ".[browser,build]"

      # —— Download embedded Python interpreter ——
      - name: Download python-standalone (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: bash scripts/download_python_standalone.sh

      - name: Download python-standalone (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\scripts\download_python_standalone.ps1

      # —— macOS: import signing certificate (optional) ——
      - name: Import Apple signing certificate
        if: matrix.os == 'macos-latest' && env.BUILD_CERTIFICATE_BASE64 != '' && env.P12_PASSWORD != '' && env.KEYCHAIN_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          python3 -c "import base64,sys,os; sys.stdout.buffer.write(base64.b64decode(os.environ['BUILD_CERTIFICATE_BASE64']))" > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "✅ Certificate imported into temporary keychain"

      # —— macOS build (signed if certificate present, unsigned otherwise) ——
      - name: Build macOS app
        if: matrix.os == 'macos-latest'
        run: |
          if [ -n "${BUILD_CERTIFICATE_BASE64:-}" ] && [ -n "${P12_PASSWORD:-}" ] && [ -n "${KEYCHAIN_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "Signing certificate detected — building with codesign + notarization"
            SIGN_IDENTITY="$(
              security find-identity -v -p codesigning "$RUNNER_TEMP/app-signing.keychain-db" \
              | grep "Developer ID Application" | head -1 \
              | sed 's/.*"\(.*\)"/\1/'
            )"
            if [ -z "$SIGN_IDENTITY" ]; then
              echo "ERROR: No Developer ID Application identity found in keychain"
              exit 1
            fi
            echo "Using identity: $SIGN_IDENTITY"
            export SIGN_IDENTITY
            export APPLE_ID
            export APPLE_TEAM_ID
            export APPLE_APP_SPECIFIC_PASSWORD
            bash build.sh
          else
            echo "No signing secrets — building unsigned"
            OUROBOROS_SIGN=0 bash build.sh
          fi

      # —— macOS: cleanup keychain ——
      - name: Cleanup keychain
        if: matrix.os == 'macos-latest' && always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      # —— Linux build ——
      - name: Build Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: bash build_linux.sh

      # —— Windows build ——
      - name: Build Windows executable
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\build_windows.ps1

      # —— Upload artifacts ——
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ouroboros-${{ matrix.os }}
          path: dist/Ouroboros-*
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # Release: Create GitHub Release with all artifacts
  # ──────────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
